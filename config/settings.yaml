# 王者荣耀农场自动化配置

# 设备配置
device:
  adb_port: 7555               # MuMu模拟器ADB端口
  screenshot_format: opencv    # 截图格式

# 农场配置
farm:
  harvest_interval: 300        # 收菜间隔(秒)
  max_harvest_per_run: 20      # 每次最多收菜数量
  auto_plant: true             # 收菜后自动种菜
  default_crop: "小麦"         # 默认种植作物

# 好友配置
friends:
  max_steal_per_run: 10        # 每次最多偷菜数量
  max_bless_per_run: 20        # 每次最多祝福数量

# 图像识别配置
vision:
  default_threshold: 0.8       # 默认匹配阈值
  wait_timeout: 10.0           # 等待超时时间

# 操作配置
action:
  click_delay: 0.3             # 点击后延迟
  swipe_duration: 0.5          # 滑动持续时间
  random_delay: true           # 随机延迟(防检测)

# 日志配置
logging:
  level: INFO
  file: logs/app.log