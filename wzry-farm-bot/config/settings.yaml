# 王者荣耀农场自动化配置文件

# 设备配置
device:
  adb_port: 7555              # MuMu模拟器ADB端口
  screenshot_delay: 0.5       # 截图延迟（秒）
  connect_timeout: 30         # 连接超时（秒）

# 农场配置
farm:
  harvest_interval: 300       # 收菜检查间隔（秒）
  steal_interval: 600         # 偷菜检查间隔（秒）
  bless_interval: 1800        # 祝福检查间隔（秒）
  default_crop: "小麦"        # 默认种植作物

# 安全配置（防检测）
safety:
  random_delay: true          # 启用随机延迟
  max_steal_per_run: 10       # 单次最大偷菜次数
  max_bless_per_run: 20       # 单次最大祝福次数
  operation_interval: 0.5     # 操作间隔（秒）

# 调度配置
schedule:
  enable_harvest: true        # 启用自动收菜
  enable_plant: true          # 启用自动种菜
  enable_steal: true          # 启用自动偷菜
  enable_bless: true          # 启用自动祝福
  plant_cron:                 # 定时种菜（可选）
    hour: 8                   # 每天早上8点
    minute: 0
